<style>
:root{--navy:#1a1a2e;--red:#c0392b;--gold:#e8a838;--blue:#3a7bd5;--green:#27ae60;--bg:#f4f6fb;--card:#fff;--border:#e8eaf2;--sub:#8a8fa8;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--navy);}
body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;font-size:14px;}
#app{max-width:480px;margin:0 auto;background:var(--bg);height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

/* HEADER */
.hdr{background:linear-gradient(150deg,#1a1a2e,#16213e 55%,#0f3460);color:#fff;
  padding:max(env(safe-area-inset-top,0px),8px) 16px 10px;flex-shrink:0;position:relative;overflow:hidden;}
.hdr::after{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;
  background:radial-gradient(circle,rgba(192,57,43,.22),transparent 65%);border-radius:50%;pointer-events:none;}
.hdr-r1{display:flex;justify-content:space-between;align-items:center;}
.hdr-year{font-size:12px;opacity:.6;letter-spacing:1px;}
.hdr-nav{display:flex;gap:6px;}
.nav-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);color:#fff;
  width:32px;height:32px;border-radius:8px;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;}
.nav-btn:active{background:rgba(255,255,255,.3);}
.hdr-big{display:flex;align-items:flex-end;gap:6px;margin-top:0px;}
.hdr-month{font-size:52px;font-weight:900;line-height:1;letter-spacing:-3px;
  background:linear-gradient(135deg,#fff 40%,rgba(255,255,255,.5));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hdr-mkr{font-size:16px;opacity:.5;padding-bottom:7px;}
.hdr-chips{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);
  border-radius:20px;padding:2px 9px;font-size:11px;color:rgba(255,255,255,.7);}
.chip b{color:#fff;font-weight:700;}

/* WEEKDAYS */
.wdays{display:grid;grid-template-columns:repeat(7,1fr);background:var(--card);
  border-bottom:1px solid var(--border);flex-shrink:0;}
.wd{text-align:center;padding:6px 0 5px;font-size:12px;font-weight:800;color:var(--sub);}
.wd.su{color:var(--red);}
.wd.sa{color:var(--blue);}

/* CALENDAR */
.cal{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);padding:1px;}
.dc{min-height:62px;background:var(--card);padding:4px 2px 3px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;user-select:none;
  -webkit-user-select:none;position:relative;transition:background .1s;}
.dc:active{background:#fef2f1;}
.dc.om{opacity:.2;pointer-events:none;background:var(--bg);}
.dc.tod .sn{background:var(--red)!important;color:#fff!important;box-shadow:0 2px 10px rgba(192,57,43,.4);}
.dc.sel{background:#fff5f4;}
.dc.su .sn{color:var(--red);}
.dc.sa .sn{color:var(--blue);}
.dc.hol .sn{color:var(--red)!important;}
.sn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;border-radius:7px;color:var(--navy);margin-bottom:1px;}
.ln{font-size:9px;color:#b0b5c8;}
.em{font-size:15px;margin:1px 0 0;}
.gj{font-size:9.5px;color:#a07840;font-weight:700;}
.son{font-size:6.5px;color:var(--green);font-weight:800;}
.son-dot{position:absolute;top:3px;right:3px;width:5px;height:5px;
  background:var(--green);border-radius:50%;}

/* LEGEND */
.leg{padding:5px 14px;padding-bottom:calc(5px + env(safe-area-inset-bottom,0px));
  background:var(--card);border-top:1px solid var(--border);
  display:flex;gap:12px;font-size:10.5px;color:var(--sub);flex-shrink:0;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:4px;}
.ld{width:6px;height:6px;border-radius:50%;}

/* OVERLAY */
.ov{position:fixed;inset:0;background:rgba(10,10,30,.65);
  display:flex;align-items:flex-end;justify-content:center;z-index:100;
  backdrop-filter:blur(3px);}
.pop{background:#fff;width:100%;max-width:480px;border-radius:24px 24px 0 0;
  overflow:hidden;max-height:92vh;display:flex;flex-direction:column;}
.ph{width:44px;height:5px;background:#e0e0e0;border-radius:3px;
  margin:14px auto 0;flex-shrink:0;}
.pscroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
.pbody{padding:16px 18px 20px;}

/* Popup header */
.phdr{background:linear-gradient(135deg,#1a1a2e,#0f3460);border-radius:18px;
  padding:18px 20px;margin-bottom:18px;display:flex;align-items:center;gap:14px;
  position:relative;overflow:hidden;}
.phdr::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;
  background:radial-gradient(circle,rgba(192,57,43,.2),transparent 65%);border-radius:50%;pointer-events:none;}
.pem{font-size:46px;flex-shrink:0;}
.pdate{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.5px;}
.phol{display:inline-block;background:rgba(192,57,43,.8);color:#fff;font-size:10px;
  font-weight:700;border-radius:10px;padding:2px 8px;margin-top:3px;}
.pgj{margin-top:5px;font-size:13px;color:rgba(255,255,255,.55);line-height:1.6;}
.pgjhl{color:#f7c948;font-weight:700;}

/* Section label */
.slbl{font-size:11px;font-weight:800;letter-spacing:2px;margin-bottom:9px;
  display:flex;align-items:center;gap:7px;}
.slbl::after{content:'';flex:1;height:1px;background:currentColor;opacity:.15;}
.sw{color:#e74c3c;}.sg{color:#c8880a;}.sb{color:#3a7bd5;}

/* WORST card */
.wcard{background:linear-gradient(135deg,#1a1a2e,#2a1010);
  border:1.5px solid rgba(231,76,60,.4);border-radius:18px;
  padding:18px 20px;display:flex;align-items:center;gap:18px;
  margin-bottom:18px;position:relative;overflow:hidden;}
.wcard::before{content:'⚡';position:absolute;right:18px;top:50%;
  transform:translateY(-50%);font-size:44px;opacity:.09;}
.wji{font-size:50px;font-weight:700;color:#e74c3c;line-height:1;}
.wname{font-size:24px;font-weight:900;color:#fff;letter-spacing:-.3px;}
.wtime{font-size:14px;color:rgba(255,255,255,.4);margin-top:3px;}
.wbadge{display:inline-block;background:rgba(231,76,60,.2);color:#e74c3c;
  font-size:11px;font-weight:800;border-radius:8px;padding:3px 10px;
  margin-top:7px;border:1px solid rgba(231,76,60,.3);}

/* GOOD grid */
.gg{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:18px;}
.gi{background:linear-gradient(145deg,#fffbf0,#fff8e0);
  border:1.5px solid rgba(232,168,56,.35);border-radius:16px;
  padding:10px 8px;text-align:center;display:flex;align-items:center;gap:10px;}
.gji{font-size:28px;font-weight:700;color:var(--red);line-height:1;flex-shrink:0;width:36px;}
.ginfo{text-align:left;}
.gname{font-size:15px;font-weight:700;color:#7d4e00;}
.gtime{font-size:11px;color:#bfa060;margin-top:2px;}

/* BAD grid */
.bg2{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:10px;}
.bi{background:#f0f4fa;border:1px solid #d0d8ee;border-radius:14px;
  padding:12px 4px;text-align:center;}
.bji{font-size:22px;font-weight:700;color:#3a7bd5;line-height:1;}
.bname{font-size:11px;font-weight:700;color:#5b7aaa;margin-top:3px;}
.btime{font-size:9px;color:#9aaac8;margin-top:1px;}
.pnote{font-size:10px;color:#ccc;text-align:center;margin-top:10px;}

/* FOOTER buttons */
.pfooter{padding:12px 18px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0px));
  display:flex;gap:10px;flex-shrink:0;border-top:1px solid var(--border);background:#fff;}
.bdl{flex:1;background:linear-gradient(135deg,#1a1a2e,#0f3460);color:#fff;border:none;
  border-radius:14px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;}
.bdl:active{opacity:.8;}
.bdl:disabled{opacity:.5;}
.bcl{flex:1;background:#f0f2f7;color:var(--navy);border:none;border-radius:14px;
  padding:16px;font-size:16px;font-weight:700;cursor:pointer;}
.bcl:active{opacity:.7;}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-r1">
      <div class="hdr-year" id="hdr-year"></div>
      <div class="hdr-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
        <button class="nav-btn" onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="hdr-big">
      <div class="hdr-month" id="hdr-month"></div>
      <div class="hdr-mkr" id="hdr-mkr"></div>
    </div>
    <div class="hdr-chips" id="hdr-chips"></div>
  </div>
  <div class="wdays">
    <div class="wd su">일</div><div class="wd">월</div><div class="wd">화</div>
    <div class="wd">수</div><div class="wd">목</div><div class="wd">금</div>
    <div class="wd sa">토</div>
  </div>
  <div class="cal"><div class="grid" id="cal-grid"></div></div>
  <div class="leg">
    <div class="li"><div class="ld" style="background:#27ae60"></div>손없는날</div>
    <div class="li"><div class="ld" style="background:#c0392b"></div>공휴일</div>
    <div class="li">📅 날짜 누르면 황도길시</div>
  </div>
</div>

<!-- POPUP -->
<div class="ov" id="popup" style="display:none" onclick="if(event.target===this)closePopup()">
  <div class="pop">
    <div class="ph"></div>
    <div class="pscroll">
      <div class="pbody" id="pbody"></div>
    </div>
    <div class="pfooter">
      <button class="bdl" id="btn-dl" onclick="downloadImage()">⬇ 이미지 저장</button>
      <button class="bcl" onclick="closePopup()">닫기</button>
    </div>
  </div>
</div>

<script>
/* ── 데이터 ── */
const SHI={'子':{n:'자시',t:'23:00~01:00'},'丑':{n:'축시',t:'01:00~03:00'},'寅':{n:'인시',t:'03:00~05:00'},'卯':{n:'묘시',t:'05:00~07:00'},'辰':{n:'진시',t:'07:00~09:00'},'巳':{n:'사시',t:'09:00~11:00'},'午':{n:'오시',t:'11:00~13:00'},'未':{n:'미시',t:'13:00~15:00'},'申':{n:'신시',t:'15:00~17:00'},'酉':{n:'유시',t:'17:00~19:00'},'戌':{n:'술시',t:'19:00~21:00'},'亥':{n:'해시',t:'21:00~23:00'}};
const HT={'子':{g:['申','卯','酉','子','午','丑'],w:'寅',b:['戌','辰','亥','巳','未']},'丑':{g:['戌','巳','亥','寅','申','卯'],w:'辰',b:['子','午','丑','未','酉']},'寅':{g:['子','丑','未','辰','戌','巳'],w:'午',b:['寅','申','卯','酉','亥']},'卯':{g:['寅','卯','酉','午','子','未'],w:'申',b:['辰','戌','巳','亥','丑']},'辰':{g:['辰','巳','亥','申','寅','酉'],w:'戌',b:['午','子','未','丑','卯']},'巳':{g:['午','未','丑','戌','辰','亥'],w:'子',b:['申','寅','酉','卯','巳']},'午':{g:['申','卯','酉','子','午','丑'],w:'寅',b:['戌','辰','亥','巳','未']},'未':{g:['戌','巳','亥','寅','申','卯'],w:'辰',b:['子','午','丑','未','酉']},'申':{g:['子','丑','未','辰','戌','巳'],w:'午',b:['寅','申','卯','酉','亥']},'酉':{g:['寅','卯','酉','午','子','未'],w:'申',b:['辰','戌','巳','亥','丑']},'戌':{g:['辰','巳','亥','申','寅','酉'],w:'戌',b:['午','子','未','丑','卯']},'亥':{g:['午','未','丑','戌','辰','亥'],w:'子',b:['申','寅','酉','卯','巳']}};
const JJ=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const JKR=['자','축','인','묘','진','사','오','미','신','유','술','해'];
const GKR=['갑','을','병','정','무','기','경','신','임','계'];
const GHJ=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const ANI=['🐭','🐮','🐯','🐰','🐲','🐍','🐴','🐑','🐵','🐔','🐶','🐷'];
const MKR=['一','二','三','四','五','六','七','八','九','十','十一','十二'];
const LD={2024:{m:[2,10],d:[29,30,29,29,30,29,30,29,30,30,29,30,29]},2025:{m:[1,29],d:[30,29,30,29,30,30,29,30,29,30,29,30]},2026:{m:[2,17],d:[29,30,29,30,29,30,30,29,30,29,30,29]},2027:{m:[2,6],d:[30,29,30,29,30,29,30,30,29,30,29,30,29]},2028:{m:[1,26],d:[30,29,30,29,30,29,30,29,30,30,29,30]}};
const HOL={'2025-01-01':'신정','2025-01-29':'설날','2025-03-01':'삼일절','2025-05-05':'어린이날','2025-06-06':'현충일','2025-08-15':'광복절','2025-10-03':'개천절','2025-10-06':'추석','2025-10-09':'한글날','2025-12-25':'성탄절','2026-01-01':'신정','2026-01-29':'설날','2026-03-01':'삼일절','2026-05-05':'어린이날','2026-06-06':'현충일','2026-08-15':'광복절','2026-09-25':'추석','2026-10-03':'개천절','2026-10-09':'한글날','2026-12-25':'성탄절'};

/* ── 유틸 ── */
function dk(y,m,d){return`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function isSon(d){return[9,10,19,20,29,30].includes(d);}

function getLunar(y,m,d){
  try{
    const dt=LD[y];if(!dt)return{m:'?',d:'?'};
    const ls=new Date(y,dt.m[0]-1,dt.m[1]),tg=new Date(y,m-1,d);
    let df=Math.round((tg-ls)/86400000);
    if(df<0){const pd=LD[y-1];if(!pd)return{m:'?',d:'?'};df=Math.round((tg-new Date(y-1,pd.m[0]-1,pd.m[1]))/86400000);let lm=1,ld=0;for(let i=0;i<pd.d.length;i++){if(df<pd.d[i]){ld=df+1;break;}df-=pd.d[i];lm++;}return{m:lm,d:ld};}
    let lm=1,ld=0;for(let i=0;i<dt.d.length;i++){if(df<dt.d[i]){ld=df+1;break;}df-=dt.d[i];lm++;}return{m:lm,d:ld};
  }catch(e){return{m:'?',d:'?'};}
}

function getGanji(y,m,d){
  const df=Math.round((new Date(y,m-1,d)-new Date(1900,0,1))/86400000);
  const gi=((df)%10+10)%10,ji=((df+10)%12+12)%12;
  return{han:GHJ[gi],ji:JJ[ji],kr:GKR[gi],jkr:JKR[ji],em:ANI[ji]};
}

function getGanjiYear(y){const d=y-1984,g=((d%10)+10)%10,j=((d%12)+12)%12;return GHJ[g]+JJ[j];}

function getHours(ji){
  const dt=HT[ji]||HT['子'];
  const s=a=>[...a].sort((x,z)=>JJ.indexOf(x)-JJ.indexOf(z));
  return{good:s(dt.g).map(j=>({ji:j,...SHI[j]})),worst:{ji:dt.w,...SHI[dt.w]},bad:s(dt.b).map(j=>({ji:j,...SHI[j]}))};
}

/* ── 상태 ── */
const today=new Date();
let curY=today.getFullYear(),curM=today.getMonth()+1,selCell=null;

function changeMonth(dir){
  curM+=dir;
  if(curM>12){curM=1;curY++;}
  if(curM<1){curM=12;curY--;}
  selCell=null;
  render();
}

/* ── 달력 렌더링 ── */
function render(){
  const gy=getGanjiYear(curY);
  document.getElementById('hdr-year').textContent=`${curY}년 ${gy}년`;
  document.getElementById('hdr-month').textContent=curM;
  document.getElementById('hdr-mkr').textContent=MKR[curM-1]+'月';

  // 통계
  const dim=new Date(curY,curM,0).getDate();
  let h=0,s=0,w=0;
  for(let d=1;d<=dim;d++){
    const dow=new Date(curY,curM-1,d).getDay(),k=dk(curY,curM,d);
    if(dow===0||HOL[k])h++;else if(dow===6)s++;else w++;
  }
  document.getElementById('hdr-chips').innerHTML=
    `<div class="chip">공휴일 <b>${h}</b></div><div class="chip">토요일 <b>${s}</b></div><div class="chip">평일 <b>${w}</b></div>`;

  // 그리드
  const fd=new Date(curY,curM-1,1).getDay();
  const pv=new Date(curY,curM-1,0).getDate();
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';

  const cells=[];
  for(let i=fd-1;i>=0;i--){const m2=curM===1?12:curM-1,y2=curM===1?curY-1:curY;cells.push({y:y2,m:m2,d:pv-i,o:true});}
  for(let d=1;d<=dim;d++)cells.push({y:curY,m:curM,d,o:false});
  const rem=42-cells.length;
  for(let d=1;d<=rem;d++){const m2=curM===12?1:curM+1,y2=curM===12?curY+1:curY;cells.push({y:y2,m:m2,d,o:true});}

  cells.forEach((cell,idx)=>{
    const dow=idx%7;
    const ln=getLunar(cell.y,cell.m,cell.d);
    const gj=getGanji(cell.y,cell.m,cell.d);
    const isT=cell.y===today.getFullYear()&&cell.m===today.getMonth()+1&&cell.d===today.getDate();
    const k=dk(cell.y,cell.m,cell.d);
    const isH=!!HOL[k];
    const son=!cell.o&&isSon(ln.d);
    const isSel=selCell&&selCell.y===cell.y&&selCell.m===cell.m&&selCell.d===cell.d;
    const ls=typeof ln.d==='number'&&ln.d>0?`${ln.m}.${ln.d}`:'';

    const cls=['dc',cell.o?'om':'',isT?'tod':'',dow===0?'su':'',dow===6?'sa':'',isH?'hol':'',isSel?'sel':''].filter(Boolean).join(' ');
    const el=document.createElement('div');
    el.className=cls;
    el.innerHTML=`
      <div class="sn">${cell.d}</div>
      <div class="ln">${ls}</div>
      ${!cell.o?`<div class="em">${gj.em}</div><div class="gj">${gj.kr}${gj.jkr}</div>${son?'<div class="son-dot"></div><div class="son">손없는날</div>':''}`:''}
    `;
    if(!cell.o){
      el.addEventListener('click',()=>{selCell=cell;openPopup(cell);});
    }
    grid.appendChild(el);
  });
}

/* ── 팝업 ── */
function openPopup(cell){
  const{y,m,d}=cell;
  const ln=getLunar(y,m,d),gj=getGanji(y,m,d);
  const{good,worst,bad}=getHours(gj.ji);
  const hol=HOL[dk(y,m,d)];
  const lnS=typeof ln.d==='number'?`음력 ${ln.m}월 ${ln.d}일`:'';

  document.getElementById('pbody').innerHTML=`
    <div class="phdr">
      <div class="pem">${gj.em}</div>
      <div>
        <div class="pdate">${y}년 ${m}월 ${d}일</div>
        ${hol?`<div class="phol">${hol}</div>`:''}
        <div class="pgj">${lnS}<br><span class="pgjhl">${gj.kr}${gj.jkr}일</span> <span style="font-size:12px;opacity:.7">(${gj.han}${gj.ji}日)</span></div>
      </div>
    </div>

    <div class="slbl sw">🚫 절대 금지 시간</div>
    <div class="wcard">
      <div class="wji">${worst.ji}</div>
      <div>
        <div class="wname">${worst.n}</div>
        <div class="wtime">${worst.t}</div>
        <div class="wbadge">절대 사용 금지</div>
      </div>
    </div>

    <div class="slbl sg">☀️ 좋은 시간 6개</div>
    <div class="gg">
    ${good.map(h=>`<div class="gi"><div class="gji">${h.ji}</div><div class="ginfo"><div class="gname">${h.n}</div><div class="gtime">${h.t}</div></div></div>`).join('')}
    </div>

    <div class="slbl sb">🌑 나쁜 시간 5개</div>
    <div class="bg2">
      ${bad.map(h=>`<div class="bi"><div class="bji">${h.ji}</div><div class="bname">${h.n}</div><div class="btime">${h.t}</div></div>`).join('')}
    </div>
    <div class="pnote">* 전통 만세력 황도길시 조견표 기준 (참고용)</div>
  `;

  // 저장용 데이터 보관
  window._popCell={y,m,d,gj,ln,hol,lnS,good,worst,bad};
  document.getElementById('popup').style.display='flex';
  document.body.style.overflow='hidden';
}

function closePopup(){
  document.getElementById('popup').style.display='none';
  document.body.style.overflow='';
  selCell=null;
  render();
}

/* ── 이미지 저장 (Canvas) ── */
function downloadImage(){
  const btn=document.getElementById('btn-dl');
  btn.disabled=true;btn.textContent='⏳ 저장 중...';

  setTimeout(()=>{
    try{
      const{y,m,d,gj,lnS,hol,good,worst,bad}=window._popCell;
      const W=800, pad=36, sc=2;

      // ── 높이 미리 계산 (여백 최소화) ──
      const HDR_H=260; // 계산용 (실제는 아래서 동적 처리)
      const WORST_H=190;
      const GOOD_ROWS=Math.ceil(good.length/2), GOOD_CARD_H=160, GOOD_GAP=8;
      const GOOD_TOTAL=GOOD_ROWS*(GOOD_CARD_H+GOOD_GAP)+GOOD_GAP;
      const BAD_CARD_H=170, BAD_GAP=7;
      const BAD_TOTAL=BAD_CARD_H+BAD_GAP;
      const SECTION_LABEL=50;
      const HDR_DYN = hol ? 230 : 200;
      const TOTAL_H = 24 + HDR_DYN + 16
        + SECTION_LABEL + WORST_H + 16
        + SECTION_LABEL + GOOD_TOTAL + 16
        + SECTION_LABEL + BAD_TOTAL + 20
        + 30;

      const canvas=document.createElement('canvas');
      canvas.width=W*sc; canvas.height=TOTAL_H*sc;
      const c=canvas.getContext('2d');
      c.scale(sc,sc);

      // BG
      c.fillStyle='#f4f6fb'; c.fillRect(0,0,W,TOTAL_H);

      // ── 헤더 박스 ──
      const HDR_H_ACTUAL = hol ? 230 : 200;
      const hg=c.createLinearGradient(0,16,W,16+HDR_H_ACTUAL);
      hg.addColorStop(0,'#1a1a2e'); hg.addColorStop(.6,'#16213e'); hg.addColorStop(1,'#0f3460');
      c.fillStyle=hg; c.beginPath(); c.roundRect(pad,16,W-pad*2,HDR_H_ACTUAL,20); c.fill();

      // 이모지
      c.font='90px serif'; c.fillText(gj.em, pad+20, 16+96);

      // 날짜
      const tx=pad+128;
      c.fillStyle='#fff'; c.font='bold 58px sans-serif';
      c.fillText(`${y}년 ${m}월 ${d}일`, tx, 16+68);
      let ey=16+106;
      if(hol){
        c.fillStyle='rgba(192,57,43,.85)'; c.beginPath(); c.roundRect(tx,16+76,160,38,10); c.fill();
        c.fillStyle='#fff'; c.font='bold 24px sans-serif'; c.fillText(hol,tx+12,16+102);
        ey=16+136;
      }
      c.fillStyle='rgba(255,255,255,.6)'; c.font='30px serif';
      c.fillText(lnS, tx, ey);
      c.fillStyle='#f7c948'; c.font='bold 34px serif';
      c.fillText(`${gj.kr}${gj.jkr}일  (${gj.han}${gj.ji}日)`, tx, ey+42);

      let y0 = 16+HDR_H_ACTUAL+16;

      // ── 섹션 라벨 ──
      function sectionLabel(txt, color){
        c.fillStyle=color; c.font='bold 26px sans-serif';
        c.fillText(txt, pad, y0+26);
        c.strokeStyle=color+'44'; c.lineWidth=2;
        c.beginPath(); c.moveTo(pad+c.measureText(txt).width+12,y0+14);
        c.lineTo(W-pad,y0+14); c.stroke();
        y0+=SECTION_LABEL;
      }

      // ── 🚫 최악 ──
      sectionLabel('🚫  절대 금지 시간','#e74c3c');
      const wbg=c.createLinearGradient(0,y0,0,y0+WORST_H);
      wbg.addColorStop(0,'#1a1a2e'); wbg.addColorStop(1,'#2a1010');
      c.fillStyle=wbg; c.beginPath(); c.roundRect(pad,y0,W-pad*2,WORST_H,18); c.fill();
      c.strokeStyle='rgba(231,76,60,.5)'; c.lineWidth=3; c.stroke();
      c.fillStyle='#e74c3c'; c.font='bold 120px serif';
      c.fillText(worst.ji, pad+20, y0+WORST_H-18);
      const wx=pad+148;
      c.fillStyle='#fff'; c.font='bold 56px sans-serif'; c.fillText(worst.n, wx, y0+68);
      c.fillStyle='rgba(255,255,255,.5)'; c.font='38px sans-serif'; c.fillText(worst.t, wx, y0+116);
      c.fillStyle='rgba(231,76,60,.3)'; c.beginPath(); c.roundRect(wx,y0+130,230,42,10); c.fill();
      c.fillStyle='#e74c3c'; c.font='bold 26px sans-serif'; c.fillText('절대 사용 금지', wx+14, y0+160);
      y0+=WORST_H+18;

      // ── ☀️ 좋은 시간 (2열) ──
      sectionLabel('☀️  좋은 시간  6개','#c8880a');
      const gCols=2, gGap=GOOD_GAP;
      const gw=Math.floor((W-pad*2-gGap*(gCols-1))/gCols);
      good.forEach((h,i)=>{
        const col=i%gCols, row=Math.floor(i/gCols);
        const x=pad+col*(gw+gGap), gy2=y0+row*(GOOD_CARD_H+gGap);
        const gg=c.createLinearGradient(x,gy2,x,gy2+GOOD_CARD_H);
        gg.addColorStop(0,'#fffbf0'); gg.addColorStop(1,'#fff8e0');
        c.fillStyle=gg; c.beginPath(); c.roundRect(x,gy2,gw,GOOD_CARD_H,14); c.fill();
        c.strokeStyle='rgba(232,168,56,.45)'; c.lineWidth=2; c.stroke();
        c.fillStyle='#c0392b'; c.font='bold 90px serif';
        c.fillText(h.ji, x+16, gy2+GOOD_CARD_H-14);
        const gx2=x+114;
        c.fillStyle='#7d4e00'; c.font='bold 38px sans-serif'; c.fillText(h.n, gx2, gy2+58);
        c.fillStyle='#bfa060'; c.font='30px sans-serif'; c.fillText(h.t, gx2, gy2+102);
      });
      y0+=GOOD_ROWS*(GOOD_CARD_H+gGap)+18;

      // ── 🌑 나쁜 시간 (5열) ──
      sectionLabel('🌑  나쁜 시간  5개','#3a7bd5');
      const bCols=5, bGap=BAD_GAP;
      const bw2=Math.floor((W-pad*2-bGap*(bCols-1))/bCols);
      bad.forEach((h,i)=>{
        const x=pad+i*(bw2+bGap);
        c.fillStyle='#f0f4fa'; c.beginPath(); c.roundRect(x,y0,bw2,BAD_CARD_H,12); c.fill();
        c.strokeStyle='#d0d8ee'; c.lineWidth=1.5; c.stroke();
        c.textAlign='center';
        c.fillStyle='#3a7bd5'; c.font='bold 62px serif'; c.fillText(h.ji,x+bw2/2,y0+74);
        c.fillStyle='#5b7aaa'; c.font='bold 24px sans-serif'; c.fillText(h.n,x+bw2/2,y0+110);
        c.fillStyle='#9aaac8'; c.font='20px sans-serif'; c.fillText(h.t,x+bw2/2,y0+146);
        c.textAlign='left';
      });
      y0+=BAD_CARD_H+20;

      // 하단 노트
      c.fillStyle='#bbb'; c.font='22px sans-serif'; c.textAlign='center';
      c.fillText('* 전통 만세력 황도길시 조견표 기준 (참고용)', W/2, y0);

      // ── 저장 ──
      const url=canvas.toDataURL('image/png');
      const fname=`황도길시_${y}${String(m).padStart(2,'0')}${String(d).padStart(2,'0')}.png`;
      try{
        const a=document.createElement('a'); a.download=fname; a.href=url; a.click();
      }catch(e){
        const w=window.open('','_blank');
        w.document.write(`<html><body style="margin:0;background:#111">
          <img src="${url}" style="width:100%;display:block">
          <p style="color:#fff;text-align:center;padding:12px;font-size:14px">
          이미지를 <b>길게 누르면</b> 저장할 수 있어요</p>
          </body></html>`);
      }
    }catch(err){alert('저장 실패: '+err.message);}
    btn.disabled=false; btn.textContent='⬇ 이미지 저장';
  }, 100);
}

/* ── 시작 ── */
render();
</script>
</body>
</html>
